<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pizza AR Menu</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; font-family: Arial, sans-serif; color: white; }
    .header {
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      padding: 15px; text-align: center;
    }
    .header h1 { font-size: 24px; }
    .header p { font-size: 13px; opacity: 0.9; }
    model-viewer {
      width: 100%;
      height: 70vh;
      background: #111;
      --poster-color: #111;
    }
    .info {
      background: #222;
      margin: 10px;
      border-radius: 15px;
      padding: 15px;
      border-left: 4px solid #ff6b35;
    }
    .name { font-size: 22px; font-weight: bold; color: #ff6b35; }
    .desc { color: #aaa; font-size: 13px; margin-top: 5px; }
    .row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .price { font-size: 26px; font-weight: bold; color: #f7931e; }
    .btn {
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      color: white; border: none;
      padding: 10px 22px; border-radius: 20px;
      font-size: 15px; font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🍕 AR Pizza Menu</h1>
    <p>નીચે AR બટન દબાવો — Table પર Pizza જુઓ!</p>
  </div>

<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Menu</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>
<body style="margin:0; overflow:hidden;">
  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">

    <a-marker preset="hiro">
      <a-entity
        gltf-model="./models/pizza.glb"
        scale="0.5 0.5 0.5"
        position="0 0.5 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000">
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
